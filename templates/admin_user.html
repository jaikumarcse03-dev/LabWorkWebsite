<!DOCTYPE html>
<html>
<head>
    <title>Staff Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h4 class="mb-4">👨‍💼 Staff Users</h4>

    <table class="table table-bordered bg-white">
        <tr>
            <th>Username</th>
            <th>Action</th>
        </tr>

        {% for u in users %}
        <tr>
            <td>{{ u[1] }}</td>
            <td>
                <a href="{{ url_for('admin_reset_password', user_id=u[0]) }}"
                   class="btn btn-sm btn-warning">
                   🔁 Reset Password
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="{{ url_for('dashboard') }}">⬅ Back</a>
</div>

</body>
</html>
