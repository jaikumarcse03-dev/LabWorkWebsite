<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin – Reset User Password</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f7fa;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .card h4 {
            text-align: center;
            margin-bottom: 25px;
            color: #dc3545; /* Red color for admin reset */
            font-weight: 600;
        }

        .form-control {
            height: 45px;
        }

        .btn-reset {
            background-color: #dc3545;
            color: white;
            height: 45px;
            font-weight: 500;
        }

        .btn-reset:hover {
            background-color: #a71d2a;
        }
    </style>
</head>
<body>

<div class="card">
    <h4>Reset User Password</h4>

    <form method="POST" onsubmit="return confirmReset();">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required minlength="4">
        </div>

        {% if msg %}
        <div class="alert alert-success">{{ msg }}</div>
        {% elif error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <button type="submit" class="btn btn-reset w-100">Reset Password</button>
    </form>
</div>

<script>
function confirmReset() {
    return confirm("Are you sure you want to reset this user's password?");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
