<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Lab Work Tracking{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f7fa;
        }

        /* VTOP like navbar */
        .vtop-navbar {
            background-color: #0d6efd;
            padding-top: 6px;
            padding-bottom: 6px;
        }

        .vtop-navbar .navbar-brand {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
        }

        .vtop-navbar .navbar-brand:hover {
            color: #e2e6ea;
        }

        .vtop-navbar .btn {
            font-size: 12px;
            padding: 3px 8px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg vtop-navbar">
    <div class="container-fluid px-3">
        <a class="navbar-brand" href="{{ url_for('dashboard') }}">
            🖥️ VIT SCORE – Lab Work Tracking
        </a>

        <div class="ms-auto dropdown">
        <button class="btn btn-light dropdown-toggle d-flex align-items-center gap-2 fs-6 fw-semibold settings-btn"
        data-bs-toggle="dropdown">
    ⚙️ Settings
</button>

        <ul class="dropdown-menu dropdown-menu-end shadow">

            <li>
                <a class="dropdown-item" href="{{ url_for('change_password') }}">
                    🔑 Change Password
                </a>
            </li>

            {% if session.role == 'admin' %}
            <li>
                <a class="dropdown-item" href="{{ url_for('download_excel') }}">
                    📊 Download Excel
                </a>
            </li>

            <li>
                <a class="dropdown-item" href="{{ url_for('admin_change_username') }}">
                    🧑‍💼 Change Staff Username
                </a>
            </li>

            <li>
                <a class="dropdown-item" href="{{ url_for('admin_users') }}">
                    🧑‍💼 Manage Staff Password
                </a>
            </li>
            {% endif %}

            <li><hr class="dropdown-divider"></li>

            <li>
                <a class="dropdown-item text-danger" href="{{ url_for('logout') }}">
                    🚪 Logout
                </a>
            </li>

        </ul>
    </div>
</nav>  

<!-- PAGE CONTENT -->
<div class="container-fluid px-4 mt-3">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
