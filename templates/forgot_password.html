<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
        }
        .card-box {
            width: 400px;
            margin: 90px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            background: #fff;
        }
    </style>
</head>
<body>

<div class="card-box">
    <h4 class="text-center mb-4 text-primary">Forgot Password</h4>

    <form method="POST" onsubmit="return confirmReset();">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control mb-3" required>

        <label class="form-label">New Password</label>
        <input type="password" name="new_password" class="form-control mb-3" required minlength="4">

        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control mb-3" required>

        {% if msg %}
        <div class="alert alert-success">{{ msg }}</div>
        {% elif error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <button class="btn btn-primary w-100 mt-2">Reset Password</button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('login') }}">← Back to Login</a>
    </div>
</div>

<script>
function confirmReset() {
    let n = document.querySelector('[name="new_password"]').value;
    let c = document.querySelector('[name="confirm_password"]').value;

    if (n !== c) {
        alert("Password mismatch ❌");
        return false;
    }
    return confirm("Are you sure to reset password?");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
