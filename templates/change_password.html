<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
        }
        .card {
            max-width: 420px;
            margin: 90px auto;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
        .btn-primary {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>

<div class="card">
    <h4 class="text-center mb-3">🔐 Change Password</h4>

    <form method="POST" onsubmit="return confirmChange();">

        <label class="form-label">Old Password</label>
        <input type="password" name="old_password" class="form-control mb-3" required>

        <label class="form-label">New Password</label>
        <input type="password" name="new_password" class="form-control mb-3" required minlength="4">

        <label class="form-label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control mb-3" required>

        {% if msg %}
        <div class="alert alert-success">{{ msg }}</div>
        {% elif error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <button class="btn btn-primary w-100 mt-2">Change Password</button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('dashboard') }}">⬅ Back to Dashboard</a>
    </div>
</div>

<script>
function confirmChange() {
    let newPass = document.querySelector('input[name="new_password"]').value;
    let confirmPass = document.querySelector('input[name="confirm_password"]').value;

    if (newPass !== confirmPass) {
        alert("New password mismatch ❌");
        return false;
    }
    return confirm("Are you sure you want to change password?");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
